<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Página Web</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-custom">
      <div class="h-100 container-fluid">
        <a class="navbar-brand fw-bolder text-light">Veterinaria MundoPet</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse h-100 navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0 cursor-pointer">
            <li class="nav-item cursor-pointer">
              <a
                class="nav-link text-light cursor-pointer"
                aria-current="page"
                id="botonConsulta"
                >Consultar Mascotas</a
              >
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle text-light"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Editar Datos
              </a>
              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" id="botonIngresar">Ingresar</a>
                </li>
                <li>
                  <a class="dropdown-item" id="botonModificar"
                    >Modificar / Eliminar</a
                  >
                </li>
              </ul>
            </li>
          </ul>
          <div class="d-flex align-items-center">
            <h5 id="textoBienvenida" class="m-0 text-light">
              <i class="bi bi-box-arrow-right"></i>
            </h5>
          </div>
        </div>
      </div>
    </nav>

    <main id="contenido"></main>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>

    <script type="module" src="../scripts/menu.js"></script>
    <script type="module" src="../scripts/veterinarios.js"></script>
    <script type="module" src="../scripts/modificarDatos.js"></script>
  </body>
</html>
