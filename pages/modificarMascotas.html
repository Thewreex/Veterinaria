<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Página Web</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container-fluid col-10 mt-5">
      <table class="table">
        <thead>
          <tr class="table-custom">
            <th scope="col">ID</th>
            <th scope="col">Nombre</th>
            <th scope="col">Acciones</th>
          </tr>
        </thead>
        <tbody id="cuerpoTablaMod"></tbody>
      </table>

      <div
        class="modal fade"
        id="ModalModificar"
        tabindex="-1"
        aria-labelledby="tituloModal"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="tituloModal">Modificar Datos</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Cerrar"
              ></button>
            </div>

            <div id="alertMod" class="alert alert-success d-none" role="alert">
              Cambios realizados correctamente
            </div>

            <div class="modal-body p-4">
              <div class="col-10 mx-auto">
                <div class="mb-3">
                  <label for="inputNombre" class="form-label">Nombre:</label>
                  <input
                    type="text"
                    class="form-control"
                    id="inputNombre"
                    placeholder="Ingresa el nombre"
                  />
                </div>

                <div class="mb-3">
                  <label for="inputTutor" class="form-label">Tutor:</label>
                  <input
                    type="text"
                    class="form-control"
                    id="inputTutor"
                    placeholder="Ingresa el nombre del tutor"
                  />
                </div>

                <div class="mb-3">
                  <label for="inputEvMedica" class="form-label">
                    Evolución Médica:
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="inputEvMedica"
                    placeholder="Ingresa la evolución médica"
                  />
                </div>
              </div>
            </div>

            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cerrar
              </button>
              <button type="button" id="btnEnviar" class="btn btn-primary">
                Guardar cambios
              </button>
            </div>
          </div>
        </div>
      </div>


      <div
        class="modal fade"
        id="ModalEliminar"
        tabindex="-1"
        aria-labelledby="tituloModalEliminar"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="tituloModalEliminar">Eliminar Datos</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Cerrar"
              ></button>
            </div>

            <div class="modal-body p-4">
              <div class="col-10 mx-auto">
                ¿Esta seguro que desea eliminar este ingreso?
              </div>
            </div>

            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cerrar
              </button>
              <button type="button" id="btnEliminar" class="btn btn-primary" data-bs-dismiss="modal">
                Eliminar
              </button>
            </div>
          </div>

    </div>
    </div>
    </div>
    </div>

        

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
